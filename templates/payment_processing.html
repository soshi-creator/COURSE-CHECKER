<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment - KUCCPS Course Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .icon {
            font-size: 70px;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .program-type {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 30px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            color: #666;
            margin: 20px 0;
            font-size: 16px;
        }
        
        .steps {
            text-align: left;
            margin: 30px 0;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            color: #999;
        }
        
        .step.active {
            color: #667eea;
        }
        
        .step.completed {
            color: #4caf50;
        }
        
        .step-icon {
            width: 24px;
            text-align: center;
        }
        
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">💰</div>
        <h2>Processing Your Payment</h2>
        <div class="program-type">{{ program_type|capitalize }} Course Checker</div>
        
        <div class="spinner"></div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="message" id="message">
            Verifying your payment...
        </div>
        
        <div class="steps">
            <div class="step" id="step1">
                <span class="step-icon">⏳</span>
                <span>Verifying payment</span>
            </div>
            <div class="step" id="step2">
                <span class="step-icon">⏳</span>
                <span>Retrieving your grades</span>
            </div>
            <div class="step" id="step3">
                <span class="step-icon">⏳</span>
                <span>Finding eligible courses</span>
            </div>
            <div class="step" id="step4">
                <span class="step-icon">⏳</span>
                <span>Preparing your results</span>
            </div>
        </div>
        
        <div id="errorDiv" class="error-message hidden"></div>
    </div>
    
    <script>
        const reference = "{{ reference }}";
        
        function updateStep(stepNumber, completed = true) {
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById(`step${i}`);
                if (step) {
                    step.classList.remove('active', 'completed');
                    if (i < stepNumber) {
                        step.classList.add('completed');
                        step.querySelector('.step-icon').textContent = '✓';
                    } else if (i === stepNumber) {
                        step.classList.add('active');
                        step.querySelector('.step-icon').textContent = '⟳';
                    } else {
                        step.querySelector('.step-icon').textContent = '⏳';
                    }
                }
            }
        }
        
        function updateProgress(percent, message) {
            const fill = document.getElementById('progressFill');
            const msgDiv = document.getElementById('message');
            if (fill) fill.style.width = `${percent}%`;
            if (msgDiv && message) msgDiv.textContent = message;
        }
        
        async function processPayment() {
            updateStep(1);
            updateProgress(10, 'Verifying payment with Paystack...');
            
            try {
                // First, process the payment
                const response = await fetch('/api/process-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.status === 'complete') {
                    updateStep(4);
                    updateProgress(100, 'Redirecting to your results...');
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else if (data.status === 'failed') {
                    throw new Error(data.message || 'Payment verification failed');
                } else {
                    // Still processing, keep polling
                    setTimeout(checkStatus, 2000);
                }
            } catch (error) {
                document.getElementById('errorDiv').textContent = error.message;
                document.getElementById('errorDiv').classList.remove('hidden');
                document.querySelector('.spinner').classList.add('hidden');
            }
        }
        
        async function checkStatus() {
            try {
                const response = await fetch('/api/check-payment-status');
                const data = await response.json();
                
                if (data.status === 'complete') {
                    updateStep(4);
                    updateProgress(100, 'Redirecting to your results...');
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else if (data.status === 'processing') {
                    updateStep(2);
                    updateProgress(30, 'Payment verified! Loading your results...');
                    setTimeout(checkStatus, 2000);
                } else {
                    setTimeout(checkStatus, 2000);
                }
            } catch (error) {
                console.error('Status check error:', error);
                setTimeout(checkStatus, 3000);
            }
        }
        
        // Start the process
        if (reference) {
            processPayment();
        } else {
            document.getElementById('errorDiv').textContent = 'No payment reference found';
            document.getElementById('errorDiv').classList.remove('hidden');
        }
    </script>
</body>
</html>
