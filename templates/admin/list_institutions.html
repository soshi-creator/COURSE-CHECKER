<!DOCTYPE html>
<html>
<head>
  <title>All Institutions</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-4">Institutions</h2>
    <a href="{{ url_for('add_institutions') }}" class="btn btn-success mb-3">+ Add More Institutions</a>

    {% if institutions %}
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Name</th>
          <th style="width: 200px;">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for inst in institutions %}
        <tr>
          <td>{{ inst.name }}</td>
          <td>
            <a href="{{ url_for('edit_institution', id=inst._id) }}" class="btn btn-sm btn-primary">Edit</a>
            <form method="POST" action="{{ url_for('delete_institution', id=inst._id) }}" style="display:inline;">
              <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this institution?');">Delete</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
      <p>No institutions added yet.</p>
    {% endif %}
  </div>
</body>
</html>
