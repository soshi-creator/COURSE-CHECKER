<!DOCTYPE html>
<html>
<head>
  <title>Manage Courses</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
</head>
<body class="p-4">
  <div class="container">
    <h2>All Courses</h2>
    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th>Name</th>
          <th>Cluster</th>
          <th>Institutions</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for course in courses %}
        <tr>
          <td>{{ course.name }}</td>
          <td>{{ course.cluster }}</td>
          <td>
            <ul>
              {% for inst in course.institutions %}
              <li>{{ inst.name }} (Code: {{ inst.program_code }})</li>
              {% endfor %}
            </ul>
          </td>
          <td>
            <a href="{{ url_for('edit_course', course_id=course._id) }}" class="btn btn-sm btn-warning">Edit</a>
            <a href="{{ url_for('delete_course', course_id=course._id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this course?')">Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <a href="{{ url_for('add_course') }}" class="btn btn-success mt-3">+ Add New Course</a>
  </div>
</body>
</html>
