<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Admin Panel</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('admin_users', admin_key=request.args.get('admin_key')) }}">Users</a>
                <a class="nav-link" href="{{ url_for('admin_results', admin_key=request.args.get('admin_key')) }}">Results</a>
                <a class="nav-link" href="{{ url_for('admin_withdrawals', key=request.args.get('admin_key')) }}">Withdrawals</a>
                <a class="nav-link" href="{{ url_for('admin_stats', admin_key=request.args.get('admin_key')) }}">Stats</a>
                <a class="nav-link" href="{{ url_for('admin_notifications') }}?admin_key={{ request.args.get('admin_key') }}">Notifications</a>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid mt-4">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
