<!DOCTYPE html>
<html>
<head>
  <title>Edit Course</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
  <script>
    // Store initial data for preservation
    let initialInstitutions = {{ course.institutions|tojson|safe }};
    let initialRequirements = {{ course.requirements|tojson|safe }};
    
    function addInstitutionField(name = '', code = '', cutoff = '') {
      const container = document.getElementById('institutions-container');
      const div = document.createElement('div');
      div.className = 'row mb-2 institution-row';
      div.innerHTML = `
        <div class="col-md-4">
          <select name="institution_names[]" class="form-select" required>
            <option value="">Select Institution</option>
            {% for inst in institutions %}
              <option value="{{ inst.name }}" ${name === '{{ inst.name }}' ? 'selected' : ''}>{{ inst.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <input name="program_codes[]" class="form-control" value="${code.replace(/"/g, '&quot;')}" placeholder="Program Code" required>
        </div>
        <div class="col-md-4">
          <input type="number" step="0.1" name="cutoffs[]" class="form-control" value="${cutoff}" placeholder="Cutoff" required>
        </div>
      `;
      container.appendChild(div);
    }

    function addRequirementField(subject = '', grade = '') {
      const container = document.getElementById('requirements-container');
      const div = document.createElement('div');
      div.className = 'row mb-2 requirement-row';
      div.innerHTML = `
        <div class="col-md-6">
          <input name="subjects[]" class="form-control" value="${subject.replace(/"/g, '&quot;')}" placeholder="Subject" required>
        </div>
        <div class="col-md-6">
          <select name="min_grades[]" class="form-select" required>
            {% for g in ['A','A-','B+','B','B-','C+','C','C-','D+','D','D-','E'] %}
              <option value="{{ g }}" ${grade === '{{ g }}' ? 'selected' : ''}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
      `;
      container.appendChild(div);
    }
    
    // Function to remove all institution fields
    function clearInstitutionFields() {
      const container = document.getElementById('institutions-container');
      container.innerHTML = '';
    }
    
    // Function to remove all requirement fields
    function clearRequirementFields() {
      const container = document.getElementById('requirements-container');
      container.innerHTML = '';
    }
    
    // Function to reset to original institutions
    function resetInstitutions() {
      clearInstitutionFields();
      initialInstitutions.forEach(inst => {
        addInstitutionField(inst.name, inst.program_code, inst.cutoff);
      });
    }
    
    // Function to reset to original requirements
    function resetRequirements() {
      clearRequirementFields();
      initialRequirements.forEach(req => {
        addRequirementField(req.subject, req.minGrade);
      });
    }
    
    // Function to toggle institution editing mode
    function toggleInstitutionEdit() {
      const container = document.getElementById('institutions-container');
      const btn = document.getElementById('toggle-institutions-btn');
      const rows = container.querySelectorAll('.institution-row');
      
      rows.forEach(row => {
        const selects = row.querySelectorAll('select, input');
        selects.forEach(input => {
          if (btn.textContent === 'Edit Institutions') {
            input.disabled = false;
          } else {
            input.disabled = true;
          }
        });
      });
      
      if (btn.textContent === 'Edit Institutions') {
        btn.textContent = 'Cancel Institution Edit';
        btn.classList.remove('btn-secondary');
        btn.classList.add('btn-warning');
      } else {
        btn.textContent = 'Edit Institutions';
        btn.classList.remove('btn-warning');
        btn.classList.add('btn-secondary');
      }
    }
    
    // Function to toggle requirement editing mode
    function toggleRequirementEdit() {
      const container = document.getElementById('requirements-container');
      const btn = document.getElementById('toggle-requirements-btn');
      const rows = container.querySelectorAll('.requirement-row');
      
      rows.forEach(row => {
        const inputs = row.querySelectorAll('input, select');
        inputs.forEach(input => {
          if (btn.textContent === 'Edit Requirements') {
            input.disabled = false;
          } else {
            input.disabled = true;
          }
        });
      });
      
      if (btn.textContent === 'Edit Requirements') {
        btn.textContent = 'Cancel Requirement Edit';
        btn.classList.remove('btn-secondary');
        btn.classList.add('btn-warning');
      } else {
        btn.textContent = 'Edit Requirements';
        btn.classList.remove('btn-warning');
        btn.classList.add('btn-secondary');
      }
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      // Disable all institution and requirement fields initially (read-only mode)
      const institutionRows = document.querySelectorAll('.institution-row');
      institutionRows.forEach(row => {
        const inputs = row.querySelectorAll('select, input');
        inputs.forEach(input => input.disabled = true);
      });
      
      const requirementRows = document.querySelectorAll('.requirement-row');
      requirementRows.forEach(row => {
        const inputs = row.querySelectorAll('input, select');
        inputs.forEach(input => input.disabled = true);
      });
    });
  </script>
</head>
<body class="p-4">
  <div class="container">
    <h2>Edit Course</h2>
    <form method="POST" id="editForm">
      <div class="mb-3">
        <label>Course Name:</label>
        <input type="text" name="name" class="form-control" value="{{ course.name }}" required>
      </div>
      <div class="mb-3">
        <label>Cluster Number:</label>
        <input type="number" name="cluster" class="form-control" value="{{ course.cluster }}" required>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h4>Institutions Offering This Course</h4>
          <div>
            <button type="button" id="toggle-institutions-btn" onclick="toggleInstitutionEdit()" class="btn btn-sm btn-secondary me-2">Edit Institutions</button>
            <button type="button" onclick="resetInstitutions()" class="btn btn-sm btn-info me-2">Reset Institutions</button>
            <button type="button" onclick="addInstitutionField()" class="btn btn-sm btn-success">+ Add Institution</button>
          </div>
        </div>
        <div id="institutions-container">
          {% for inst in course.institutions %}
          <div class="row mb-2 institution-row">
            <div class="col-md-4">
              <select name="institution_names[]" class="form-select" required>
                <option value="">Select Institution</option>
                {% for i in institutions %}
                <option value="{{ i.name }}" {% if i.name == inst.name %}selected{% endif %}>{{ i.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <input name="program_codes[]" class="form-control" value="{{ inst.program_code }}" placeholder="Program Code" required>
            </div>
            <div class="col-md-4">
              <input type="number" step="0.1" name="cutoffs[]" class="form-control" value="{{ inst.cutoff }}" placeholder="Cutoff" required>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h4>Subject Requirements</h4>
          <div>
            <button type="button" id="toggle-requirements-btn" onclick="toggleRequirementEdit()" class="btn btn-sm btn-secondary me-2">Edit Requirements</button>
            <button type="button" onclick="resetRequirements()" class="btn btn-sm btn-info me-2">Reset Requirements</button>
            <button type="button" onclick="addRequirementField()" class="btn btn-sm btn-success">+ Add Requirement</button>
          </div>
        </div>
        <div id="requirements-container">
          {% for req in course.requirements %}
          <div class="row mb-2 requirement-row">
            <div class="col-md-6">
              <input name="subjects[]" class="form-control" value="{{ req.subject }}" placeholder="Subject Name" required>
            </div>
            <div class="col-md-6">
              <select name="min_grades[]" class="form-select" required>
                {% for g in ['A','A-','B+','B','B-','C+','C','C-','D+','D','D-','E'] %}
                <option value="{{ g }}" {% if req.minGrade == g %}selected{% endif %}>{{ g }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>

      <div>
        <button type="submit" class="btn btn-primary">Update Course</button>
        <a href="{{ url_for('list_courses') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
    
    <!-- Hidden fields to indicate which sections were edited -->
    <input type="hidden" name="edited_institutions" id="edited_institutions" value="false">
    <input type="hidden" name="edited_requirements" id="edited_requirements" value="false">
  </div>
  
  <script>
    // Track which sections were actually edited
    document.getElementById('toggle-institutions-btn').addEventListener('click', function() {
      document.getElementById('edited_institutions').value = 'true';
    });
    
    document.getElementById('toggle-requirements-btn').addEventListener('click', function() {
      document.getElementById('edited_requirements').value = 'true';
    });
  </script>
</body>
</html>
