<!DOCTYPE html>
<html>
<head>
  <title>Edit Course</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
  <script>
    function addInstitutionField(name = '', code = '', cutoff = '') {
      const container = document.getElementById('institutions-container');
      const div = document.createElement('div');
      div.className = 'row mb-2';
      div.innerHTML = `
        <div class="col-md-4">
          <select name="institution_names[]" class="form-select" required>
            <option value="">Select Institution</option>
            {% for inst in institutions %}
              <option value="{{ inst.name }}" ${name === '{{ inst.name }}' ? 'selected' : ''}>{{ inst.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <input name="program_codes[]" class="form-control" value="${code}" placeholder="Program Code" required>
        </div>
        <div class="col-md-4">
          <input type="number" step="0.1" name="cutoffs[]" class="form-control" value="${cutoff}" placeholder="Cutoff" required>
        </div>
      `;
      container.appendChild(div);
    }

    function addRequirementField(subject = '', grade = '') {
      const container = document.getElementById('requirements-container');
      const div = document.createElement('div');
      div.className = 'row mb-2';
      div.innerHTML = `
        <div class="col-md-6">
          <input name="subjects[]" class="form-control" value="${subject}" placeholder="Subject" required>
        </div>
        <div class="col-md-6">
          <select name="min_grades[]" class="form-select" required>
            {% for g in ['A','A-','B+','B','B-','C+','C','C-','D+','D','D-','E'] %}
              <option value="{{ g }}" ${grade === '{{ g }}' ? 'selected' : ''}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
      `;
      container.appendChild(div);
    }
  </script>
</head>
<body class="p-4">
  <div class="container">
    <h2>Edit Course</h2>
    <form method="POST">
      <div class="mb-3">
        <label>Course Name:</label>
        <input type="text" name="name" class="form-control" value="{{ course.name }}" required>
      </div>
      <div class="mb-3">
        <label>Cluster Number:</label>
        <input type="number" name="cluster" class="form-control" value="{{ course.cluster }}" required>
      </div>

      <h4>Institutions Offering This Course</h4>
      <div id="institutions-container">
        {% for inst in course.institutions %}
        <div class="row mb-2">
          <div class="col-md-4">
            <select name="institution_names[]" class="form-select" required>
              <option value="">Select Institution</option>
              {% for i in institutions %}
              <option value="{{ i.name }}" {% if i.name == inst.name %}selected{% endif %}>{{ i.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <input name="program_codes[]" class="form-control" value="{{ inst.program_code }}" placeholder="Program Code" required>
          </div>
          <div class="col-md-4">
            <input type="number" step="0.1" name="cutoffs[]" class="form-control" value="{{ inst.cutoff }}" placeholder="Cutoff" required>
          </div>
        </div>
        {% endfor %}
      </div>
      <button type="button" onclick="addInstitutionField()" class="btn btn-sm btn-secondary mb-3">+ Add Institution</button>

      <h4>Subject Requirements</h4>
      <div id="requirements-container">
        {% for req in course.requirements %}
        <div class="row mb-2">
          <div class="col-md-6">
            <input name="subjects[]" class="form-control" value="{{ req.subject }}" placeholder="Subject Name" required>
          </div>
          <div class="col-md-6">
            <select name="min_grades[]" class="form-select" required>
              {% for g in ['A','A-','B+','B','B-','C+','C','C-','D+','D','D-','E'] %}
              <option value="{{ g }}" {% if req.minGrade == g %}selected{% endif %}>{{ g }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        {% endfor %}
      </div>
      <button type="button" onclick="addRequirementField()" class="btn btn-sm btn-secondary mb-3">+ Add Requirement</button>

      <div>
        <button type="submit" class="btn btn-primary">Update Course</button>
        <a href="{{ url_for('list_courses') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</body>
</html>
