<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - KUCCPS Course Checker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e3e9f7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .offline-container {
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid #e9ecef;
        }
        .offline-icon {
            font-size: 4rem;
            color: #3498db;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .offline-features {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .offline-features li {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .offline-features i {
            color: #3498db;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="bi bi-wifi-off"></i>
        </div>
        <h1>You're Offline</h1>
        <p>Don't worry! You can still:</p>
        
        <div class="offline-features">
            <ul style="list-style: none; padding: 0;">
                <li><i class="bi bi-check-circle"></i> View previously visited pages</li>
                <li><i class="bi bi-check-circle"></i> Access course information</li>
                <li><i class="bi bi-check-circle"></i> Browse saved searches</li>
                <li><i class="bi bi-check-circle"></i> Use basic navigation</li>
            </ul>
        </div>
        
        <p>Some features require internet connection:</p>
        <ul style="list-style: none; padding: 0; margin-bottom: 25px;">
            <li><i class="bi bi-x-circle" style="color: #e74c3c;"></i> Check new courses</li>
            <li><i class="bi bi-x-circle" style="color: #e74c3c;"></i> Submit applications</li>
            <li><i class="bi bi-x-circle" style="color: #e74c3c;"></i> Make payments</li>
        </ul>
        
        <button onclick="window.location.reload()">
            <i class="bi bi-arrow-clockwise"></i>
            Try Again
        </button>
    </div>
</body>
</html>
